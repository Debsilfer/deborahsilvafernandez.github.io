<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deborah Silva Fernandez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0c0c;
      --bg2:      #141414;
      --line:     #1e1e1e;
      --text:     #e8e4dc;
      --muted:    #555;
      --hint:     #333;
      --tag-dib:  #2d1f4a; --tag-dib-t:  #b89eec;
      --tag-fot:  #0d2a3a; --tag-fot-t:  #7ec4ef;
      --tag-fanz: #3a2600; --tag-fanz-t: #f0a830;
      --tag-mus:  #2e1010; --tag-mus-t:  #f07070;
      --tag-rad:  #1a0f2e; --tag-rad-t:  #d4a0f5;
      --tag-vid:  #1a1a00; --tag-vid-t:  #d4c84a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { opacity: 0.7; }

    /* ── HEADER ── */
    header {
      padding: 48px 48px 36px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .site-name {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1;
    }

    /* Bio: vacía por ahora, está lista para escribirte */
    .site-bio {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      max-width: 400px;
      font-style: italic;
      min-height: 0;
    }

    nav {
      display: flex;
      gap: 24px;
    }

    nav a {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: lowercase;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--text); opacity: 1; }

    /* ── FEED ── */
    .feed-header {
      padding: 20px 48px 12px;
      font-size: 10px;
      color: var(--hint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    main { padding: 0 48px 80px; }

    .entry {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 24px;
      border-bottom: 1px solid var(--line);
      padding: 24px 0;
    }

    .entry-date {
      padding-top: 2px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.6;
    }

    .entry-date .day {
      display: block;
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--hint);
      line-height: 1;
      margin-bottom: 2px;
    }

    .entry-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .tag-dib  { background: var(--tag-dib);  color: var(--tag-dib-t); }
    .tag-fot  { background: var(--tag-fot);  color: var(--tag-fot-t); }
    .tag-fanz { background: var(--tag-fanz); color: var(--tag-fanz-t); }
    .tag-mus  { background: var(--tag-mus);  color: var(--tag-mus-t); }
    .tag-rad  { background: var(--tag-rad);  color: var(--tag-rad-t); }
    .tag-vid  { background: var(--tag-vid);  color: var(--tag-vid-t); }

    .entry-title {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .entry-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 560px;
    }

    /* Imagen */
    .entry-img {
      margin-top: 14px;
      border-radius: 6px;
      overflow: hidden;
      max-width: 560px;
    }

    .entry-img img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 6px;
    }

    /* YouTube embed */
    .entry-video {
      margin-top: 14px;
      max-width: 560px;
      border-radius: 6px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
    }

    .entry-video iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--line);
      padding: 20px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--hint);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header { padding: 32px 24px 24px; flex-direction: column; gap: 20px; align-items: flex-start; }
      main { padding: 0 24px 60px; }
      .feed-header { padding: 16px 24px 10px; }
      .entry { grid-template-columns: 70px 1fr; gap: 16px; }
      footer { padding: 16px 24px; flex-direction: column; gap: 8px; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <div class="site-name">Deborah Silva Fernandez</div>
      <!-- Bio: descomentá y escribí cuando quieras agregarla -->
      <!-- <p class="site-bio">Tu bio acá.</p> -->
    </div>
    <nav>
      <a href="#feed">feed</a>
      <a href="https://www.youtube.com/@radiotranshumante" target="_blank" rel="noopener">youtube</a>
      <a href="mailto:deborahsilvafernandez@gmail.com">contacto</a>
    </nav>
  </header>

  <div class="feed-header">abril 2025 ↓</div>

  <main id="feed">

    <!-- ══════════════════════════════════════════
         CÓMO AGREGAR UNA ENTRADA:

         Para agregar imagen: descomentá el bloque .entry-img

<article class="entry">
  <div class="entry-date">

  <div class="entry-content">

    <div class="entry-img"><img src="Auto 2.jpg" alt="descripción" /></div>
    <div class="entry-img"><img src="Arbol.jpg" alt="descripción" /></div>
  </div>
</article>
  

  </main>

  <footer>
    <span>Deborah Silva Fernandez · 2026</span>
    <span>deborahsilvafernandez@gmail.com</span>
  </footer>

</body>
</html>
